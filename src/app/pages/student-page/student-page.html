<div class="flex flex-col justify-center items-center w-full min-w-0 p-5">

  <!-- Header -->
  <div class="w-full">
     <page-header
      entityName="Alumnos"
      (add)="openStudentModal()">
    </page-header>

   @if (errorMessage()) {
    <div class="text-red-600 mb-4">
      {{ errorMessage() }}
    </div>
  }

  @if (isModalOpen()) {
    <student-modal
      (close)="closeStudentModal()"
      (save)="createStudent($event)" />
  }

  </div>

  <!-- Tabla -->
  <table-complete
    class="w-full"
    [columnsName]="columnsName()"
    [rows]="rows()"
    [keys]="studentKeys"
    [actions]="actions"
  />

  <!-- Paginación -->
   <pagination
      [totalElements]="totalStudents()"
      [currentPage]="currentPage()"
      (pageChange)="changePage($event)"/>
</div>
