<div class="flex items-center justify-center gap-3 mt-6">

  <!-- anterior -->
  <button
    class="neo-btn flex items-center gap-2 px-4 py-2 rounded-full
           text-[var(--color-title-main)]"
    (click)="prev()"
    [disabled]="currentPage() === 0"
  >

    <svg xmlns="http://www.w3.org/2000/svg"
         width="18" height="18"
         viewBox="0 0 20 20"
         class="opacity-80">
      <path fill="currentColor"
            d="m2 10l8 8l1.4-1.4L5.8 11H18V9H5.8l5.6-5.6L10 2z"/>
    </svg>

    <span>Anterior</span>
  </button>

  <!-- páginas -->
  @for (page of pages(); track page) {

    <button
      class="neo-page w-10 h-10 flex items-center justify-center rounded-full"
      [class.neo-active]="page === currentPage()"
      (click)="goTo(page)"
    >
      {{ page + 1 }}
    </button>

  }

  <!-- siguiente -->
  <button
    class="neo-btn flex items-center gap-2 px-4 py-2 rounded-full
           text-[var(--color-title-main)]"
    (click)="next()"
    [disabled]="currentPage() === totalPages() - 1"
  >

    <span>Siguiente</span>

    <svg xmlns="http://www.w3.org/2000/svg"
         width="18" height="18"
         viewBox="0 0 20 20"
         class="opacity-80">
      <path fill="currentColor"
            d="M8.6 3.4L14.2 9H2v2h12.2l-5.6 5.6L10 18l8-8l-8-8z"/>
    </svg>

  </button>

</div>
